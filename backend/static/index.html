<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Performance Visualizer</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="shell">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">⚡</div>
                <span>SYS<br>MONITOR</span>
            </div>

            <nav class="nav-section">
                <div class="nav-label">Navigation</div>
                <a class="nav-item active">Dashboard</a>
                <a class="nav-item">System Stats</a>
                <a class="nav-item">Scheduling</a>
                <a class="nav-item">Load</a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-dot">
                    <div class="dot"></div>
                    LIVE
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Topbar -->
            <header class="topbar">
                <h1>SYSTEM <span>VISUALIZER</span></h1>
                <div class="topbar-meta">
                    <div id="clock">--:--:--</div>
                </div>
            </header>

            <!-- Content -->
            <div class="content">

                <!-- Charts -->
                <div class="charts-row">

                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">CPU Usage</div>
                        </div>
                        <div class="card-body">
                            <canvas id="cpuChart"></canvas>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">Memory Usage</div>
                        </div>
                        <div class="card-body">
                            <canvas id="memoryChart"></canvas>
                        </div>
                    </div>

                </div>

                <!-- Load Control -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Load Control</div>
                    </div>
                    <div class="card-body">

                        <h4>CPU Load</h4>
                        <button onclick="cpuAdd()">Increase CPU</button>
                        <button onclick="cpuReduce()">Reduce CPU</button>
                        <button onclick="cpuStop()">Stop CPU</button>

                        <hr>

                        <h4>Memory Load</h4>
                        <button onclick="memoryAdd()">Increase Memory</button>
                        <button onclick="memoryReduce()">Reduce Memory</button>
                        <button onclick="memoryStop()">Stop Memory</button>

                    </div>
                </div>

                <!-- Scheduler Controls -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Process Input</div>
                    </div>
                    <div class="card-body">

                        <div id="process-inputs">
                            <div class="proc-row">
                                Arrival: <input type="number" class="arrival" />
                                Burst: <input type="number" class="burst" />
                            </div>
                        </div>

                        <button onclick="addProcess()">Add Process</button>
                        <button id="run-btn" onclick="runScheduler()">Run FCFS</button>

                    </div>
                </div>

                <!-- Output -->
                <div class="output-row">

                    <!-- Gantt -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">Gantt Chart</div>
                            <div id="current-process" style="margin-top:5px"></div>
                        </div>
                        <div class=" card-body">
                            <div id="gantt-container">
                                <div id="gantt"></div>
                                <div id="timeline"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title">Scheduling Table</div>
                        </div>
                        <div class="card-body">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Arrival</th>
                                        <th>Burst</th>
                                        <th>Start</th>
                                        <th>Completion</th>
                                        <th>Waiting</th>
                                        <th>Turnaround</th>
                                    </tr>
                                </thead>
                                <tbody id="scheduler-body"></tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <!-- JS -->

    <script>
        // 🔥 GLOBAL CONFIG (shared across all scripts)
        window.API_BASE = '/api';
    </script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/scheduler.js"></script>
    <script src="/static/js/load.js"></script>

</body>

</html>
